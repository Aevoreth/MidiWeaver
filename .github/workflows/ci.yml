name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install engine
        run: pip install -e "./apps/engine[dev]"
        working-directory: .
      - name: Pytest
        run: python -m pytest tests -v
        working-directory: apps/engine

  desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build
        run: |
          npm ci
          npm run build -w @midiweaver/desktop
